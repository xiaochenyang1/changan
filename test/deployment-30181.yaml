apiVersion: apps/v1
kind: Deployment
metadata:
  name: ca-admin
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ca-admin
  template:
    metadata:
      labels:
        app: ca-admin
    spec:
      containers:
        - name: ca-admin
          image: ca-admin:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ca-admin
  namespace: default
spec:
  type: NodePort
  selector:
    app: ca-admin
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30181